<!DOCTYPE html>
<html>
<head>
<title>SENSI X LAB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:linear-gradient(135deg,#000000,#071a24,#000000);color:white;text-align:center;font-family:Arial;">
<p id="device" style="color:#00ffff;font-size:18px;"></p>
<select id="ram">
<option>2GB RAM</option>
<option>3GB RAM</option>
<option>4GB RAM</option>
<option>6GB RAM</option>
<option>8GB+ RAM</option>
</select>

<br><br>
<select id="mode">
<option>Balanced</option>
<option>Headshot</option>
<option>Drag</option>
</select>

<br><br>
<button style="background:#00ffff;color:black;border:none;padding:15px 25px;border-radius:12px;font-size:18px;font-weight:bold;" onclick="generate()">⚡ Generate Sensitivity</button>

<h2 id="result" style="margin-top:30px;background:#111;padding:20px;border-radius:15px;box-shadow:0 0 20px #00ffff;width:80%;margin-left:auto;margin-right:auto;"></h2>

  <button onclick="copySensi()" style="margin-top:15px;background:#00ffff;color:black;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;">📋 Copy Sensitivity</button>
<script>
function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generate(){

let ram = document.getElementById("ram").value;
let mode = document.getElementById("mode").value;

let general, reddot, scope2x, scope4x, awm, freelook;

if(ram=="2GB RAM"){
  general=191; reddot=78; scope2x=69; scope4x=53; awm=32; freelook=88;
}
else if(ram=="3GB RAM"){
  general=189; reddot=76; scope2x=67; scope4x=51; awm=34; freelook=91;
}
else if(ram=="4GB RAM"){
  general=181; reddot=35; scope2x=92; scope4x=73; awm=45; freelook=119;
}
else if(ram=="6GB RAM"){
  general=171; reddot=120; scope2x=105; scope4x=85; awm=55; freelook=130;
}
else{
  general=161; reddot=80; scope2x=120; scope4x=95; awm=60; freelook=145;
}

if(mode=="Headshot"){
  general += 10;
  reddot += 15;
}
else if(mode=="Drag"){
  general += 20;
}

document.getElementById("result").innerHTML =
"Mode: "+mode+"<br><br>"+
"General: "+general+"<br>"+
"Red Dot: "+reddot+"<br>"+
"2x Scope: "+scope2x+"<br>"+
"4x Scope: "+scope4x+"<br>"+
"AWM: "+awm+"<br>"+
"Free Look: "+freelook;

showRank();
}


function copySensi(){
  let text=document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("Sensitivity Copied!");
}

function getRating(){
  return Math.floor(Math.random() * 11) + 90;
}

function showRank(){
  let rating = getRating();

  document.getElementById("result").innerHTML +=
  "<br><br>⭐ Headshot Rating: " + rating + "/100" +
  "<br>🏆 Best For: CS Ranked";
}
  function detectDevice(){
document.getElementById("device").innerHTML =
"📱 Device Detected";
}

window.onload = detectDevice;
</script>

</body>
</html>
