<!DOCTYPE html>
<html>
<head>
<title>SENSI X LAB</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background:linear-gradient(135deg,#000000,#071a24,#000000);color:white;text-align:center;font-family:Arial;">
<h1 style="font-size:55px;color:#00ffff;text-shadow:0 0 20px #00ffff,0 0 40px #00ffff;">SENSI X LAB</h1>
<h3 style="color:#b8faff;">Ultimate Free Fire Sensitivity Generator</h3>

<select id="ram">
<option>2GB RAM</option>
<option>3GB RAM</option>
<option>4GB RAM</option>
<option>6GB RAM</option>
<option>8GB+ RAM</option>
</select>

<br><br>
<select id="mode">
<option>Balanced</option>
<option>Headshot</option>
<option>Drag</option>
</select>

<br><br>
<button style="background:#00ffff;color:black;border:none;padding:15px 25px;border-radius:12px;font-size:18px;font-weight:bold;" onclick="generate()">⚡ Generate Sensitivity</button>

<h2 id="result" style="margin-top:30px;background:#111;padding:20px;border-radius:15px;box-shadow:0 0 20px #00ffff;width:80%;margin-left:auto;margin-right:auto;"></h2>

  <button onclick="copySensi()" style="margin-top:15px;background:#00ffff;color:black;border:none;padding:12px 20px;border-radius:10px;font-weight:bold;">📋 Copy Sensitivity</button>
<script>
function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generate(){
  let mode=document.getElementById("mode").value;
  document.getElementById("result").innerHTML=
    "Mode: "+mode+"<br><br>"+
"General: "+random(120,200)+"<br>"+
"Red Dot: "+random(100,200)+"<br>"+
"2x Scope: "+random(100,190)+"<br>"+
"4x Scope: "+random(80,180)+"<br>"+
"AWM: "+random(50,150)+"<br>"+
"Free Look: "+random(120,200);
}
  function copySensi(){
let text=document.getElementById("result").innerText;
navigator.clipboard.writeText(text);
alert("Sensitivity Copied!");
}
</script>

</body>
</html>
